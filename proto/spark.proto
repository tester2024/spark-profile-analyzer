syntax = "proto3";

package spark;

message SamplerData {
  SamplerMetadata metadata = 1;
  repeated ThreadNode threads = 2;
  map<string, string> class_sources = 3;
  map<string, string> method_sources = 4;
  map<string, string> line_sources = 5;
  repeated int32 time_windows = 6;
  map<int32, WindowStatistics> time_window_statistics = 7;
  SocketChannelInfo channel_info = 8;
}

message SamplerMetadata {
  CommandSenderMetadata creator = 1;
  int64 start_time = 2;
  int32 interval = 3;
  ThreadDumper thread_dumper = 4;
  DataAggregator data_aggregator = 5;
  string comment = 6;
  PlatformMetadata platform_metadata = 7;
  PlatformStatistics platform_statistics = 8;
  SystemStatistics system_statistics = 9;
  map<string, string> server_configurations = 10;
  int64 end_time = 11;
  int32 number_of_ticks = 12;
  map<string, PluginOrModMetadata> sources = 13;
  map<string, string> extra_platform_metadata = 14;
  SamplerMode sampler_mode = 15;
  SamplerEngine sampler_engine = 16;
  string sampler_engine_version = 17;
}

enum SamplerMode {
  EXECUTION = 0;
  ALLOCATION = 1;
}

enum SamplerEngine {
  JAVA = 0;
  ASYNC = 1;
}

message CommandSenderMetadata {
  string name = 1;
  string type = 2;
  string unique_id = 3;
}

message ThreadDumper {
  enum Type {
    ALL = 0;
    SPECIFIC = 1;
    REGEX = 2;
  }
  Type type = 1;
  repeated int64 ids = 2;
  repeated string patterns = 3;
}

message DataAggregator {
  enum Type {
    SIMPLE = 0;
    TICKED = 1;
  }
  enum ThreadGrouper {
    BY_NAME = 0;
    BY_POOL = 1;
    AS_ONE = 2;
  }
  Type type = 1;
  ThreadGrouper thread_grouper = 2;
  int64 tick_length_threshold = 3;
  int32 number_of_included_ticks = 4;
}

message ThreadNode {
  string name = 1;
  repeated StackTraceNode children = 3;
  repeated double times = 4;
  repeated int32 children_refs = 5;
}

message StackTraceNode {
  string class_name = 3;
  string method_name = 4;
  int32 parent_line_number = 5;
  int32 line_number = 6;
  string method_desc = 7;
  repeated double times = 8;
  repeated int32 children_refs = 9;
}

message HeapData {
  HeapMetadata metadata = 1;
  repeated HeapEntry entries = 2;
}

message HeapMetadata {
  CommandSenderMetadata creator = 1;
  int64 start_time = 2;
  PlatformMetadata platform_metadata = 3;
  PlatformStatistics platform_statistics = 4;
  SystemStatistics system_statistics = 5;
  map<string, string> server_configurations = 6;
  map<string, PluginOrModMetadata> sources = 7;
}

message HeapEntry {
  int32 order = 1;
  int32 instances = 2;
  int64 size = 3;
  string type = 4;
}

message HealthData {
  HealthMetadata metadata = 1;
  map<int32, WindowStatistics> time_window_statistics = 2;
}

message HealthMetadata {
  CommandSenderMetadata creator = 1;
  int64 start_time = 2;
  PlatformMetadata platform_metadata = 3;
  SystemStatistics system_statistics = 4;
  map<string, string> server_configurations = 5;
}

message PlatformMetadata {
  enum Type {
    SERVER = 0;
    CLIENT = 1;
    PROXY = 2;
    APPLICATION = 3;
  }
  Type type = 1;
  string name = 2;
  string version = 3;
  string minecraft_version = 4;
  int32 spark_version = 7;
  string brand = 8;
}

message PlatformStatistics {
  Memory memory = 1;
  map<string, GcStat> gc = 2;
  int64 uptime = 3;
  Tps tps = 4;
  Mspt mspt = 5;
  Ping ping = 6;
  int64 player_count = 7;
  WorldStatistics world = 8;
  OnlineMode online_mode = 9;

  message Tps {
    double last1m = 1;
    double last5m = 2;
    double last15m = 3;
    int32 game_target_tps = 4;
  }

  message Mspt {
    RollingAverageValues last1m = 1;
    RollingAverageValues last5m = 2;
    int32 game_max_ideal_mspt = 3;
  }

  message Memory {
    MemoryUsage heap = 1;
    MemoryUsage non_heap = 2;
    repeated MemoryPool pools = 3;
  }

  message MemoryPool {
    string name = 1;
    MemoryUsage before = 2;
    MemoryUsage after = 3;
  }
}

message GcStat {
  int64 total = 1;
  double avg_time = 2;
  double avg_frequency = 3;
}

message Tps {
  double last1m = 1;
  double last5m = 2;
  double last15m = 3;
  int32 game_target_tps = 4;
}

message Mspt {
  RollingAverageValues last1m = 1;
  RollingAverageValues last5m = 2;
  int32 game_max_ideal_mspt = 3;
}

message RollingAverageValues {
  double mean = 1;
  double max = 2;
  double min = 3;
  double median = 4;
  double percentile95 = 5;
}

message MemoryUsage {
  int64 used = 1;
  int64 committed = 2;
  int64 max = 3;
}

message SystemMemoryPool {
  int64 total = 1;
  int64 used = 2;
}

message Ping {
  double last1m = 1;
  double last5m = 2;
  double last15m = 3;
}

message OnlineMode {
  bool online = 1;
}

message WorldStatistics {
  int32 total_entities = 1;
  map<string, int32> entity_counts = 2;
  repeated World worlds = 3;

  message World {
    string name = 1;
    int32 total_entities = 2;
    repeated Region regions = 3;
  }

  message Region {
    int32 total_entities = 1;
    repeated Chunk chunks = 2;
  }

  message Chunk {
    int32 x = 1;
    int32 z = 2;
    int32 total_entities = 3;
    map<string, int32> entity_counts = 4;
  }
}

message SystemStatistics {
  Cpu cpu = 1;
  Memory memory = 2;
  map<string, GcStat> gc = 3;
  Disk disk = 4;
  Os os = 5;
  Java java = 6;
  int64 uptime = 7;
  map<string, NetInterface> net = 8;
  Jvm jvm = 9;

  message Cpu {
    int32 threads = 1;
    Usage process_usage = 2;
    Usage system_usage = 3;
    string model_name = 4;
  }

  message Memory {
    SystemMemoryPool physical = 1;
    SystemMemoryPool swap = 2;
  }
}

message Cpu {
  int32 threads = 1;
  Usage process_usage = 2;
  Usage system_usage = 3;
  string model_name = 4;
}

message Usage {
  double last1m = 1;
  double last15m = 2;
}

message Disk {
  int64 total = 1;
  int64 free = 2;
}

message Os {
  string arch = 1;
  string name = 2;
  string version = 3;
}

message Java {
  string vendor = 1;
  string version = 2;
  string runtime_name = 3;
  string flags = 4;
}

message Jvm {
  string name = 1;
  string vendor = 2;
  string version = 3;
}

message NetInterface {
  repeated int64 bytes_read = 1;
  repeated int64 bytes_written = 2;
}

message WindowStatistics {
  int32 ticks = 1;
  double cpu_process = 2;
  double cpu_system = 3;
  double tps = 4;
  double mspt_median = 5;
  double mspt_max = 6;
  int32 players = 7;
  int32 entities = 8;
  int32 tile_entities = 9;
  int32 chunks = 10;
  int64 start_time = 11;
  int64 end_time = 12;
  int32 duration = 13;
}

message SocketChannelInfo {
  string address = 1;
  int32 port = 2;
  bool ssl = 3;
}

message PluginOrModMetadata {
  string name = 1;
  string version = 2;
  string author = 3;
  string description = 4;
}